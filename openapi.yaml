              schema:
                type: object
                required: [success, quoteId]
                properties:
                  success:
                    type: boolean
                  quoteId:
                    type: string
                  expiresAt:
                    type: string
                    format: date-time
                  current:
                    type: object
                    additionalProperties: true
                  target:
                    type: object
                    additionalProperties: true
                  pricing:
                    type: object
                    additionalProperties: true
                  proration:
                    type: object
                    additionalProperties: true
                  oneShotChargeInCents:
                    type: integer
                  promo:
                    type: object
                    nullable: true
                    additionalProperties: true
