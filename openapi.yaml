openapi: 3.0.3
info:
  title: OLIM Backend API
  version: 0.1.0
  description: >
    Spécification OpenAPI (Swagger) générée à partir des routes/contrôleurs présents dans `src/`.
servers:
  - url: https://olim-backend.onrender.com
    description: Production (Render)
  - url: http://localhost:3000
    description: Local (par défaut)
tags:
  - name: System
  - name: Auth
  - name: Profile
  - name: Requests
  - name: Analytics
  - name: Uploads
  - name: Appointments
  - name: Documents
  - name: Chat
  - name: Notifications
  - name: Subscription
  - name: Support
  - name: Health
  - name: Partners
  - name: Cinema
  - name: Admin
  - name: QA
  - name: Clients

paths:
  /users/init:
    post:
      summary: Initialiser un utilisateur (signup)
      description: >
        Le frontend crée l'utilisateur dans Firebase Auth, puis appelle cet endpoint avec l'ID Token
        en `Authorization: Bearer <ID_TOKEN>`. Le backend vérifie le token et crée (si absent) le doc
        Firestore `Clients/{uid}` de façon idempotente.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Utilisateur déjà existant (idempotent)
        '201':
          description: Utilisateur créé
        '401':
          description: Non authentifié (token manquant/invalide)
  /api/auth/session:
    get:
      summary: Vérifier la session (ID Token Firebase)
      description: >
        Vérifie le token Firebase (Bearer) et renvoie un état minimal de session
        (uid + infos basiques + flags DB).
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
        '401':
          description: Non authentifié (token manquant/invalide)
  /api/auth/logout:
    post:
      summary: Déconnexion serveur (révocation refresh tokens)
      description: >
        Optionnel : le frontend fait déjà `Firebase signOut`. Cet endpoint révoque les refresh tokens
        Firebase pour forcer une reconnexion lors du prochain rafraîchissement de token.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
        '401':
          description: Non authentifié (token manquant/invalide)
  /health:
    get:
      tags: [System]
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status, timestamp]
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /v1/requests:
    post:
      tags: [Requests]
      summary: Créer une demande (backend-first)
      description: >
        Crée une demande dans Firestore (`Clients/{uid}/Requests/{requestId}`) puis tente un upsert dans Supabase
        (`public.requests`) avec une clé idempotente. Les dates ISO dans `request` sont acceptées et converties
        côté serveur si possible.
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          description: >
            Clé d’idempotence (recommandée). Alternative acceptée: `idempotencyKey` dans le body.
          schema:
            type: string
            maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source, idempotencyKey, request]
              properties:
                source:
                  type: string
                  enum: [APP, VOICE, SHARE, SYSTEM]
                idempotencyKey:
                  type: string
                  maxLength: 128
                request:
                  type: object
                  description: Payload legacy Firestore (sans FieldValue, dates en ISO).
                  additionalProperties: true
      responses:
        '201':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [requestId, assignedTo, priority, waitingTime, uploadedFiles, supabase]
                properties:
                  requestId:
                    type: string
                    description: ID du document Firestore créé (docId)
                  assignedTo:
                    type: string
                  priority:
                    type: integer
                  waitingTime:
                    type: string
                    nullable: true
                  uploadedFiles:
                    type: array
                    items:
                      type: string
                  supabase:
                    type: object
                    required: [inserted, id]
                    properties:
                      inserted:
                        type: boolean
                      id:
                        type: string
                        nullable: true
        '400':
          description: Paramètres invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Requête déjà en cours (idempotency lock)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/Error'

  /v1/analytics/registration/session/start:
    post:
      tags: [Analytics]
      summary: Tracking inscription - début de session
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '204':
          description: OK
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /v1/analytics/registration/step:
    post:
      tags: [Analytics]
      summary: Tracking inscription - étape
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '204':
          description: OK
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /v1/analytics/registration/error:
    post:
      tags: [Analytics]
      summary: Tracking inscription - erreur
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '204':
          description: OK
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /v1/analytics/registration/session/complete:
    post:
      tags: [Analytics]
      summary: Tracking inscription - fin de session
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '204':
          description: OK
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /v1/analytics/voice-requests:
    post:
      tags: [Analytics]
      summary: Tracking voice requests (Supabase)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subgroupId:
                  type: string
                transcription:
                  type: string
                matchedGroupName:
                  type: string
                matchedSubGroupName:
                  type: string
                createdAt:
                  type: string
                  format: date-time
      responses:
        '204':
          description: OK
        '400':
          description: Body invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /v1/uploads/requests:
    post:
      tags: [Uploads]
      summary: Upload de pièces jointes (Firebase Storage)
      description: >
        Upload des fichiers vers Firebase Storage (bucket `olimservice-7dbee`) avec un chemin
        `requests/{uid}/{timestamp}_{cleanFilename}` et retourne des URLs de download compatibles Firebase.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [files]
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      required: [url, path, contentType, size, originalName]
                      properties:
                        url:
                          type: string
                        path:
                          type: string
                        contentType:
                          type: string
                        size:
                          type: integer
                        originalName:
                          type: string
        '400':
          description: Aucun fichier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /v1/admin/conseillers/password/by-email:
    post:
      tags: [Admin]
      summary: Reset password Firebase Auth d’un conseiller (par email)
      description: >
        Permet à un **superAdmin** (doc Firestore `Conseillers2/{callerUid}` avec `superAdmin === true`)
        de changer le mot de passe Firebase Auth d’un conseiller en le ciblant par email.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, newPassword]
              properties:
                email:
                  type: string
                  format: email
                  example: conseiller@domaine.com
                newPassword:
                  type: string
                  minLength: 6
                  example: NouveauMotDePasse123
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [success, uid]
                properties:
                  success:
                    type: boolean
                    example: true
                  uid:
                    type: string
                    description: UID Firebase Auth du conseiller cible
        '400':
          description: email ou newPassword invalide
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Non authentifié / token invalide
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '403':
          description: caller non superAdmin
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  error:
                    type: string
        '404':
          description: Aucun user Firebase Auth pour cet email
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '500':
          $ref: '#/components/responses/Error'

  /api/profile:
    get:
      tags: [Profile]
      summary: Récupérer le profil client (Clients/{uid})
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profil
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Client'
                  - type: object
                    required: [uid]
                    properties:
                      uid:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Error'
    patch:
      tags: [Profile]
      summary: Mettre à jour le profil (update Firestore)
      description: >
        Le backend propage `req.body` tel quel dans Firestore (pas de validation).
        Attention aux clés legacy avec espaces.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Profil mis à jour
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Client'
                  - type: object
                    required: [uid]
                    properties:
                      uid:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/profile/complete:
    get:
      tags: [Profile]
      summary: Vérifier si le profil est complet
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Statut + profil
          content:
            application/json:
              schema:
                type: object
                required: [isComplete, profile]
                properties:
                  isComplete:
                    type: boolean
                  profile:
                    type: object
                    additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Error'

  /api/profile/language:
    patch:
      tags: [Profile]
      summary: Mettre à jour la langue du profil
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [language]
              properties:
                language:
                  type: string
                  example: fr
      responses:
        '200':
          description: Langue mise à jour
          content:
            application/json:
              schema:
                type: object
                required: [message, language]
                properties:
                  message:
                    type: string
                    example: Language updated
                  language:
                    type: string
                    example: fr
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/profile/family-members:
    get:
      tags: [Profile]
      summary: Lister les membres de famille
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste
          content:
            application/json:
              schema:
                type: object
                required: [members]
                properties:
                  members:
                    type: array
                    items:
                      type: object
                      required: [memberId]
                      properties:
                        memberId:
                          type: string
                      additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'
    post:
      tags: [Profile]
      summary: Ajouter un membre de famille
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '201':
          description: Créé
          content:
            application/json:
              schema:
                type: object
                required: [memberId]
                properties:
                  memberId:
                    type: string
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/profile/family-members/{memberId}:
    patch:
      tags: [Profile]
      summary: Mettre à jour un membre de famille
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MemberId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageWithMemberId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'
    delete:
      tags: [Profile]
      summary: Supprimer un membre de famille
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MemberId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageWithMemberId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/profile/addresses:
    get:
      tags: [Profile]
      summary: Lister les adresses
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste
          content:
            application/json:
              schema:
                type: object
                required: [addresses]
                properties:
                  addresses:
                    type: array
                    items:
                      type: object
                      required: [addressId]
                      properties:
                        addressId:
                          type: string
                      additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'
    post:
      tags: [Profile]
      summary: Ajouter une adresse
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '201':
          description: Créée
          content:
            application/json:
              schema:
                type: object
                required: [addressId]
                properties:
                  addressId:
                    type: string
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/profile/addresses/{addressId}:
    patch:
      tags: [Profile]
      summary: Mettre à jour une adresse
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AddressId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageWithAddressId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'
    delete:
      tags: [Profile]
      summary: Supprimer une adresse
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AddressId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageWithAddressId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/requests:
    get:
      tags: [Requests]
      summary: Lister les demandes du client
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
          description: Filtre sur le champ legacy `Status`
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Liste
          content:
            application/json:
              schema:
                type: object
                required: [requests]
                properties:
                  requests:
                    type: array
                    items:
                      $ref: '#/components/schemas/ClientRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'
    post:
      tags: [Requests]
      summary: Créer une demande
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequestInput'
      responses:
        '201':
          description: Créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/requests/{requestId}:
    get:
      tags: [Requests]
      summary: Détails d’une demande
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: Détails
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Error'
    patch:
      tags: [Requests]
      summary: Mise à jour d’une demande
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Demande mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'
    delete:
      tags: [Requests]
      summary: Supprimer une demande
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageWithRequestId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/requests/{requestId}/assign:
    patch:
      tags: [Requests]
      summary: Assigner un conseiller à une demande
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [advisorId]
              properties:
                advisorId:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [message, requestId, advisorId]
                properties:
                  message:
                    type: string
                    example: Advisor assigned
                  requestId:
                    type: string
                  advisorId:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/requests/{requestId}/rating:
    post:
      tags: [Requests]
      summary: Noter une demande
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating:
                  type: number
                  minimum: 0
                  maximum: 5
                  example: 5
                comment:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [message, requestId, rating]
                properties:
                  message:
                    type: string
                    example: Rating saved
                  requestId:
                    type: string
                  rating:
                    type: number
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/requests/favorites/list:
    get:
      tags: [Requests]
      summary: Liste des demandes favorites
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste
          content:
            application/json:
              schema:
                type: object
                required: [favorites]
                properties:
                  favorites:
                    type: array
                    items:
                      type: object
                      required: [favoriteId]
                      properties:
                        favoriteId:
                          type: string
                      additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/requests/favorites/{requestId}:
    post:
      tags: [Requests]
      summary: Ajouter une demande aux favoris
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [categoryId, subCategoryId]
              properties:
                categoryId:
                  type: string
                subCategoryId:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageWithRequestId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'
    delete:
      tags: [Requests]
      summary: Retirer une demande des favoris
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
