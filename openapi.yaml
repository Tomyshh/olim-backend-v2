                properties:
                  success:
                    type: boolean
        '400':
          description: Paramètres invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: État incompatible (ex: subscription/current absent, subId manquant, abonnement annulé)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/Error'

  /v1/auth/phone/otp/send:
