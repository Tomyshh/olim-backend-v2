openapi: 3.0.3
info:
  title: OLIM Backend API
  version: 0.1.0
  description: >
    Spécification OpenAPI (Swagger) générée à partir des routes/contrôleurs présents dans `src/`.
    Certaines routes sont volontairement **stubées** et répondent `501 Not implemented`.
servers:
  - url: http://localhost:3000
    description: Local (par défaut)
tags:
  - name: System
  - name: Auth
  - name: Profile
  - name: Requests
  - name: Appointments
  - name: Documents
  - name: Chat
  - name: Notifications
  - name: Subscription
  - name: Support
  - name: Health
  - name: Partners
  - name: Cinema
  - name: Admin
  - name: QA

paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status, timestamp]
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /api/auth/send-phone-otp:
    post:
      tags: [Auth]
      summary: (STUB) Envoi OTP pour lier/remplacer un téléphone (utilisateur connecté)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneNumber]
              properties:
                phoneNumber:
                  type: string
                  example: "+972501234567"
      responses:
        '501':
          $ref: '#/components/responses/NotImplemented'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/auth/verify-phone-otp-and-link:
    post:
      tags: [Auth]
      summary: (STUB) Vérification OTP + liaison téléphone au compte
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneNumber, otpCode]
              properties:
                phoneNumber:
                  type: string
                  example: "+972501234567"
                otpCode:
                  type: string
                  example: "123456"
      responses:
        '501':
          $ref: '#/components/responses/NotImplemented'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/auth/send-login-phone-otp:
    post:
      tags: [Auth]
      summary: (STUB) Envoi OTP pour login/inscription (sans auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneNumber]
              properties:
                phoneNumber:
                  type: string
                  example: "+972501234567"
      responses:
        '501':
          $ref: '#/components/responses/NotImplemented'
        '500':
          $ref: '#/components/responses/Error'

  /api/auth/verify-login-phone-otp:
    post:
      tags: [Auth]
      summary: (STUB) Vérification OTP login (retour attendu: customToken)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneNumber, otpCode]
              properties:
                phoneNumber:
                  type: string
                  example: "+972501234567"
                otpCode:
                  type: string
                  example: "123456"
      responses:
        '501':
          $ref: '#/components/responses/NotImplemented'
        '500':
          $ref: '#/components/responses/Error'

  /api/auth/create-visitor-account:
    post:
      tags: [Auth]
      summary: (STUB) Création d’un compte Visitor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                phoneNumber:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
      responses:
        '501':
          $ref: '#/components/responses/NotImplemented'
        '500':
          $ref: '#/components/responses/Error'

  /api/auth/login-email:
    post:
      tags: [Auth]
      summary: (STUB) Login email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '501':
          $ref: '#/components/responses/NotImplemented'
        '500':
          $ref: '#/components/responses/Error'

  /api/profile:
    get:
      tags: [Profile]
      summary: Récupérer le profil client (Clients/{uid})
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profil
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Client'
                  - type: object
                    required: [uid]
                    properties:
                      uid:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Error'
    patch:
      tags: [Profile]
      summary: Mettre à jour le profil (update Firestore)
      description: >
        Le backend propage `req.body` tel quel dans Firestore (pas de validation).
        Attention aux clés legacy avec espaces.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Profil mis à jour
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Client'
                  - type: object
                    required: [uid]
                    properties:
                      uid:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/profile/complete:
    get:
      tags: [Profile]
      summary: Vérifier si le profil est complet
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Statut + profil
          content:
            application/json:
              schema:
                type: object
                required: [isComplete, profile]
                properties:
                  isComplete:
                    type: boolean
                  profile:
                    type: object
                    additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Error'

  /api/profile/language:
    patch:
      tags: [Profile]
      summary: Mettre à jour la langue du profil
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [language]
              properties:
                language:
                  type: string
                  example: fr
      responses:
        '200':
          description: Langue mise à jour
          content:
            application/json:
              schema:
                type: object
                required: [message, language]
                properties:
                  message:
                    type: string
                    example: Language updated
                  language:
                    type: string
                    example: fr
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/profile/family-members:
    get:
      tags: [Profile]
      summary: Lister les membres de famille
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste
          content:
            application/json:
              schema:
                type: object
                required: [members]
                properties:
                  members:
                    type: array
                    items:
                      type: object
                      required: [memberId]
                      properties:
                        memberId:
                          type: string
                      additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'
    post:
      tags: [Profile]
      summary: Ajouter un membre de famille
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '201':
          description: Créé
          content:
            application/json:
              schema:
                type: object
                required: [memberId]
                properties:
                  memberId:
                    type: string
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/profile/family-members/{memberId}:
    patch:
      tags: [Profile]
      summary: Mettre à jour un membre de famille
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MemberId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageWithMemberId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'
    delete:
      tags: [Profile]
      summary: Supprimer un membre de famille
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MemberId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageWithMemberId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/profile/addresses:
    get:
      tags: [Profile]
      summary: Lister les adresses
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste
          content:
            application/json:
              schema:
                type: object
                required: [addresses]
                properties:
                  addresses:
                    type: array
                    items:
                      type: object
                      required: [addressId]
                      properties:
                        addressId:
                          type: string
                      additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'
    post:
      tags: [Profile]
      summary: Ajouter une adresse
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '201':
          description: Créée
          content:
            application/json:
              schema:
                type: object
                required: [addressId]
                properties:
                  addressId:
                    type: string
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/profile/addresses/{addressId}:
    patch:
      tags: [Profile]
      summary: Mettre à jour une adresse
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AddressId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageWithAddressId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'
    delete:
      tags: [Profile]
      summary: Supprimer une adresse
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AddressId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageWithAddressId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/requests:
    get:
      tags: [Requests]
      summary: Lister les demandes du client
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
          description: Filtre sur le champ legacy `Status`
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Liste
          content:
            application/json:
              schema:
                type: object
                required: [requests]
                properties:
                  requests:
                    type: array
                    items:
                      $ref: '#/components/schemas/ClientRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'
    post:
      tags: [Requests]
      summary: Créer une demande
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequestInput'
      responses:
        '201':
          description: Créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/requests/{requestId}:
    get:
      tags: [Requests]
      summary: Détails d’une demande
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: Détails
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Error'
    patch:
      tags: [Requests]
      summary: Mise à jour d’une demande
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Demande mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'
    delete:
      tags: [Requests]
      summary: Supprimer une demande
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageWithRequestId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/requests/{requestId}/files:
    post:
      tags: [Requests]
      summary: (STUB) Upload de fichiers pour une demande
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        description: À implémenter (Firebase Storage)
        required: false
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: true
      responses:
        '501':
          $ref: '#/components/responses/NotImplemented'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/requests/{requestId}/assign:
    patch:
      tags: [Requests]
      summary: Assigner un conseiller à une demande
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [advisorId]
              properties:
                advisorId:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [message, requestId, advisorId]
                properties:
                  message:
                    type: string
                    example: Advisor assigned
                  requestId:
                    type: string
                  advisorId:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/requests/{requestId}/rating:
    post:
      tags: [Requests]
      summary: Noter une demande
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating:
                  type: number
                  minimum: 0
                  maximum: 5
                  example: 5
                comment:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [message, requestId, rating]
                properties:
                  message:
                    type: string
                    example: Rating saved
                  requestId:
                    type: string
                  rating:
                    type: number
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/requests/favorites/list:
    get:
      tags: [Requests]
      summary: Liste des demandes favorites
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste
          content:
            application/json:
              schema:
                type: object
                required: [favorites]
                properties:
                  favorites:
                    type: array
                    items:
                      type: object
                      required: [favoriteId]
                      properties:
                        favoriteId:
                          type: string
                      additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/requests/favorites/{requestId}:
    post:
      tags: [Requests]
      summary: Ajouter une demande aux favoris
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [categoryId, subCategoryId]
              properties:
                categoryId:
                  type: string
                subCategoryId:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageWithRequestId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'
    delete:
      tags: [Requests]
      summary: Retirer une demande des favoris
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageWithRequestId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/appointments:
    get:
      tags: [Appointments]
      summary: Lister les rendez-vous du client
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: Liste
          content:
            application/json:
              schema:
                type: object
                required: [appointments]
                properties:
                  appointments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Appointment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'
    post:
      tags: [Appointments]
      summary: Créer un rendez-vous à partir d’un créneau disponible
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slotId]
              properties:
                slotId:
                  type: string
                requestId:
                  type: string
                  nullable: true
                notes:
                  type: string
      responses:
        '201':
          description: Créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Error'

  /api/appointments/slots/available:
    get:
      tags: [Appointments]
      summary: Lister les créneaux disponibles
      security:
        - bearerAuth: []
      parameters:
        - name: date
          in: query
          schema:
            type: string
          description: Filtre exact sur le champ Firestore `date` (format dépend des données stockées)
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Liste
          content:
            application/json:
              schema:
                type: object
                required: [slots]
                properties:
                  slots:
                    type: array
                    items:
                      $ref: '#/components/schemas/AvailableSlot'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/appointments/{appointmentId}:
    get:
      tags: [Appointments]
      summary: Détails d’un rendez-vous
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppointmentId'
      responses:
        '200':
          description: Détails
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Error'
    patch:
      tags: [Appointments]
      summary: Mettre à jour un rendez-vous
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppointmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'
    delete:
      tags: [Appointments]
      summary: Annuler un rendez-vous
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AppointmentId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [message, appointmentId]
                properties:
                  message:
                    type: string
                    example: Appointment cancelled
                  appointmentId:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/documents:
    get:
      tags: [Documents]
      summary: Lister documents (personnels + legacy)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Documents
          content:
            application/json:
              schema:
                type: object
                required: [personalDocs, legacyDocs]
                properties:
                  personalDocs:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  legacyDocs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Document'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Error'

  /api/documents/personal:
    get:
      tags: [Documents]
      summary: Récupérer les documents personnels (nouvelle structure)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Documents personnels
          content:
            application/json:
              schema:
                type: object
                required: [documents]
                properties:
