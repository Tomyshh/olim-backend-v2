                type:
                  type: string
                  default: info
                active:
                  type: boolean
                  default: true
      responses:
        '201':
          description: Créée
          content:
            application/json:
              schema:
                type: object
                required: [alertId, title, message]
                properties:
                  alertId:
                    type: string
                  title:
                    type: string
                  message:
                    type: string
                  type:
                    type: string
