components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    RequestId:
      name: requestId
      in: path
      required: true
      schema:
        type: string
    AppointmentId:
      name: appointmentId
      in: path
      required: true
      schema:
        type: string
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
    MemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
    AddressId:
      name: addressId
      in: path
      required: true
      schema:
        type: string
    ConversationId:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
    NotificationId:
      name: notificationId
      in: path
      required: true
      schema:
        type: string
    CardId:
      name: cardId
      in: path
      required: true
      schema:
        type: string
    InvoiceId:
      name: invoiceId
      in: path
      required: true
      schema:
        type: string
    RefundId:
      name: refundId
      in: path
      required: true
      schema:
        type: string
    TicketId:
      name: ticketId
      in: path
      required: true
      schema:
        type: string
    PartnerId:
      name: partnerId
      in: path
      required: true
      schema:
        type: string
    ClientId:
      name: clientId
      in: path
      required: true
      schema:
        type: string

  responses:
    Unauthorized:
      description: Non authentifié / token invalide
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            missing:
              value: { error: "Missing or invalid authorization header" }
            invalid:
              value: { error: "Invalid or expired token" }
    NotFound:
      description: Ressource non trouvée
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Not found
    Error:
      description: Erreur serveur
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotImplemented:
      description: Route stubée / non implémentée
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NotImplementedResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        stack:
          type: string
          description: Présent uniquement en environnement development
    NotImplementedResponse:
      type: object
      required: [message, note]
      properties:
        message:
          type: string
          example: Not implemented - uploadChatFile
        note:
          type: string

    Client:
      type: object
      description: >
        Document Firestore `Clients/{uid}`. Plusieurs champs legacy ont des clés avec espaces.
      properties:
        uid:
          type: string
        "First Name":
          type: string
        "Last Name":
          type: string
        Email:
          type: string
        "Phone Number":
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        language:
          type: string
        registrationComplete:
          type: boolean
        createdVia:
          type: string
        membership:
          type: object
          additionalProperties: true
        fcmTokens:
          type: array
          items:
            type: string
      additionalProperties: true

    ClientRequest:
      type: object
      description: Demande stockée sous `Clients/{uid}/Requests/{requestId}` (structure legacy).
      required: [requestId]
      properties:
        requestId:
          type: string
        "User ID":
          type: string
        "Request Type":
          type: string
        "Request Category":
          type: string
        "SubCategory ID":
          type: string
        "Request Sub-Category":
          type: string
        Description:
          type: string
        "Request Date":
          description: Date Firestore (Timestamp) sérialisée
          nullable: true
        Priority:
          type: string
        "Uploaded Files":
          type: array
          items:
            type: string
        "Available Days":
          type: array
          items:
            type: string
        "Available Hours":
          type: array
          items:
            type: string
        Tags:
          type: array
          items:
            type: string
        Status:
          type: string
        "Assigned to":
          type: string
        rating:
          type: number
      additionalProperties: true

    CreateRequestInput:
      type: object
      required: [requestType, category, description]
      properties:
        requestType:
          type: string
        category:
          type: string
        subCategoryId:
          type: string
        subCategory:
          type: string
        description:
          type: string
        priority:
          type: string
          default: normal
        files:
          type: array
          items:
            type: string
        availableDays:
          type: array
          items:
            type: string
        availableHours:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        formData:
          type: object
          additionalProperties: true

    Appointment:
      type: object
      required: [appointmentId]
      properties:
        appointmentId:
          type: string
        requestId:
          type: string
          nullable: true
        slotId:
          type: string
        date:
          nullable: true
        time:
          type: string
        status:
          type: string
        notes:
          type: string
        createdAt:
          nullable: true
        updatedAt:
          nullable: true
      additionalProperties: true

    AvailableSlot:
      type: object
      required: [slotId]
      properties:
        slotId:
          type: string
      additionalProperties: true

    Document:
      type: object
      required: [documentId]
      properties:
        documentId:
          type: string
        type:
          type: string
        typeKey:
          type: string
        fileName:
          type: string
        fileUrl:
          type: string
        storagePath:
          type: string
        uploadedAt:
          nullable: true
        memberId:
          type: string
      additionalProperties: true

    Conversation:
      type: object
      required: [conversationId]
      properties:
        conversationId:
          type: string
        requestId:
          type: string
          nullable: true
        title:
          type: string
        createdAt:
          nullable: true
        updatedAt:
          nullable: true
        lastMessage:
          $ref: '#/components/schemas/ChatMessage'
          nullable: true
        unreadCount:
          type: integer
      additionalProperties: true

    ChatMessage:
      type: object
      required: [messageId]
      properties:
        messageId:
          type: string
        senderId:
          type: string
        senderName:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [text, image, file]
        attachments:
          type: array
          items:
            type: string
        read:
          type: boolean
        createdAt:
          nullable: true
        readAt:
          nullable: true
      additionalProperties: true

    Notification:
      type: object
      required: [notificationId]
      properties:
        notificationId:
          type: string
        title:
          type: string
        body:
          type: string
        type:
          type: string
        data:
          type: object
          additionalProperties: true
        read:
          type: boolean
        createdAt:
          nullable: true
        readAt:
          nullable: true
      additionalProperties: true

    SubscriptionStatus:
      type: object
      additionalProperties: true

    Card:
      type: object
      required: [cardId]
      properties:
        cardId:
          type: string
        last4:
          type: string
        brand:
          type: string
        expiryMonth:
          type: integer
        expiryYear:
          type: integer
        isDefault:
          type: boolean
        createdAt:
          nullable: true
        updatedAt:
          nullable: true
      additionalProperties: true

    Invoice:
      type: object
      required: [invoiceId]
      properties:
        invoiceId:
          type: string
        amount:
          type: number
        currency:
          type: string
        status:
          type: string
        dueDate:
          nullable: true
        paidAt:
          nullable: true
        createdAt:
          nullable: true
      additionalProperties: true

    RefundRequest:
      type: object
      required: [refundId]
      properties:
        refundId:
          type: string
        requestId:
          type: string
          nullable: true
        amount:
          type: number
        reason:
          type: string
        status:
          type: string
        createdAt:
          nullable: true
        processedAt:
          nullable: true
        updatedAt:
          nullable: true
      additionalProperties: true

    SupportTicket:
      type: object
      required: [ticketId]
      properties:
        ticketId:
          type: string
        subject:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
        createdAt:
          nullable: true
        updatedAt:
          nullable: true
      additionalProperties: true

    HealthRequest:
      type: object
      required: [requestId]
      properties:
        requestId:
          type: string
        type:
          type: string
        description:
          type: string
        status:
          type: string
        data:
          type: object
          additionalProperties: true
        createdAt:
          nullable: true
      additionalProperties: true

    Partner:
      type: object
      required: [partnerId]
      properties:
        partnerId:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        isVIP:
          type: boolean
        logoUrl:
          type: string
        website:
          type: string
      additionalProperties: true

    Cinema:
      type: object
      properties:
        cinemaId:
          type: string
        name:
          type: string
        location:
          type: string
        movies:
          type: array
          items: {}
      additionalProperties: true

    QaStats:
      type: object
      required: [period, range, meta, global, counselors]
      properties:
        period:
          type: string
          enum: [all, week, month]
        range:
          type: object
          required: [start, end]
          properties:
            start:
              type: string
              nullable: true
            end:
              type: string
              nullable: true
        meta:
          type: object
          additionalProperties: true
        global:
          type: object
          additionalProperties: true
        counselors:
          type: array
          items:
            type: object
            additionalProperties: true

    MessageWithRequestId:
      type: object
      required: [message, requestId]
      properties:
        message:
          type: string
        requestId:
          type: string
    MessageWithMemberId:
      type: object
      required: [message, memberId]
      properties:
        message:
          type: string
        memberId:
          type: string
    MessageWithAddressId:
      type: object
      required: [message, addressId]
      properties:
        message:
          type: string
        addressId:
          type: string
    MessageWithCardId:
      type: object
      required: [message, cardId]
      properties:
        message:
          type: string
        cardId:
          type: string


